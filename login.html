<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:420px;
background:#111827;
padding:40px;
border-radius:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.logo{
text-align:center;
font-size:32px;
font-weight:700;
color:white;
margin-bottom:30px;
}

.logo span{
color:#38bdf8;
}

h2{
color:white;
margin-bottom:10px;
font-size:32px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
color:#cbd5e1;
margin-bottom:8px;
font-size:14px;
}

.input-group input{
width:100%;
padding:16px;
border:none;
outline:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:15px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#2563eb,#38bdf8);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

.bottom-text{
text-align:center;
margin-top:25px;
color:#94a3b8;
}

.bottom-text a{
color:#38bdf8;
text-decoration:none;
}

</style>
</head>
<body>

<div class="container">

<div class="logo">
💧 Water<span>Monitor</span>
</div>

<h2>Welcome Back</h2>

<p class="subtitle">
Login to access your dashboard
</p>

<div class="input-group">
<label>Username</label>
<input type="text" id="name" placeholder="Enter username">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">
</div>

<button onclick="login()">
Login
</button>

<div class="bottom-text">
Don't have an account?
<a href="register.html">Register</a>
</div>

</div>

<script>

function login(){

let name = document.getElementById("name").value;

if(name === ""){

alert("Please enter username");

return;

}

localStorage.setItem("userName", name);

window.location.href = "index.html";

}

</script>

</body>
</html>
