<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#0b1120;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

color:white;

}

.container{

width:380px;

background:#111827;

padding:40px;

border-radius:25px;

box-shadow:0 0 30px rgba(0,0,0,.4);

}

.logo{

text-align:center;

font-size:32px;

font-weight:700;

margin-bottom:10px;

}

.logo span{

color:#38bdf8;

}

.subtitle{

text-align:center;

margin-bottom:30px;

color:#94a3b8;

font-size:15px;

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#1e293b;

color:white;

font-size:15px;

outline:none;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

#error{

margin-top:15px;

text-align:center;

font-size:14px;

color:#ef4444;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

💧 Water<span>Monitor</span>

</div>

<div class="subtitle">

Admin Login

</div>

<input
type="text"
id="username"
placeholder="Enter Username">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">

Login

</button>

<div id="error"></div>

</div>

<script>

function login(){

let username=
document.getElementById("username").value;

let password=
document.getElementById("password").value;

if(
username==="admin"
&&
password==="admin123"
){

localStorage.setItem(
"adminLoggedIn",
"true"
);

window.location.href=
"admin.html";

}

else{

document.getElementById(
"error"
).innerText=

"Invalid Credentials";

}

}

</script>

</body>
</html>
